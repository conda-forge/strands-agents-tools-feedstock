{% set name = "strands-agents-tools" %}
{% set version = "0.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/strands_agents_tools-{{ version }}.tar.gz
  sha256: fd93104d2d8dcff780505e8a2fca0cb2fa7a3da6bae01369073b60da0e08c5aa

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }}
    - strands-agents >=1.0.0
    - rich <15.0.0,>=14.0.0
    - sympy >=1.12.0
    - prompt-toolkit >=3.0.51
    - colorama >=0.4.6
    - aws-requests-auth >=0.4.3
    - pyjwt >=2.10.1
    - dill >=0.4.0
    - pillow >=12.1.1
    - tenacity >=9.1.2
    - watchdog >=6.0.0
    - slack-bolt >=1.23.0
    - python-tzdata
    - aiohttp
    - markdownify

test:
  imports:
    - strands_tools
    - strands_tools.calculator
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}


about:
  home: https://strandsagents.com/latest/
  summary: A collection of specialized tools for Strands Agents
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
  doc_url: https://strandsagents.com/latest/user-guide/concepts/tools/tools_overview/
  dev_url: https://github.com/strands-agents

extra:
  recipe-maintainers:
    - yonib05
    - Unshure
    - athkulk
    - giswqs
